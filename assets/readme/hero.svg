<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">ElectricityRevitPlugin</title>
  <desc id="hero-desc">Электрика в Revit — кнопкой на ленте ERP или словами в диалоге с ИИ через MCP, который предлагает план и ждёт подтверждения перед изменением модели.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1B2A41" stroke-width="1"/>
    </pattern>
    <linearGradient id="panel-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2338"/>
      <stop offset="1" stop-color="#171B2C"/>
    </linearGradient>
    <linearGradient id="panel-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12232B"/>
      <stop offset="1" stop-color="#0E1B22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="24" fill="#0B1220"/>
  <rect width="1200" height="400" rx="24" fill="url(#grid)" opacity="0.5"/>

  <!-- left: identity -->
  <g transform="translate(56 58)">
    <text x="0" y="0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" letter-spacing="2" fill="#F5A623">REVIT PLUGIN · ЭЛЕКТРОТЕХНИКА</text>

    <text x="0" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="46" font-weight="700" fill="#E7ECF3">Electricity<tspan fill="#F5A623">RevitPlugin</tspan></text>

    <text x="0" y="106" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="23" fill="#C4CEDD">Электрика в Revit — кнопкой на ленте</text>
    <text x="0" y="136" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="23" fill="#C4CEDD">или словами в чате с ИИ.</text>

    <text x="0" y="176" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17" fill="#7C8AA0">Claude меняет модель только после вашего явного «да».</text>

    <!-- metadata chips -->
    <g transform="translate(0 206)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#C4CEDD">
      <g>
        <rect x="0" y="0" width="150" height="34" rx="10" fill="#152342" stroke="#28395C"/>
        <text x="14" y="22">Revit 2023 · 2024</text>
      </g>
      <g transform="translate(160 0)">
        <rect x="0" y="0" width="176" height="34" rx="10" fill="#152342" stroke="#28395C"/>
        <text x="14" y="22">Вкладка ERP на ленте</text>
      </g>
      <g transform="translate(0 46)">
        <rect x="0" y="0" width="252" height="34" rx="10" fill="#16292B" stroke="#245257"/>
        <text x="14" y="22" fill="#7FDCEA">MCP + Claude · спросит «да»</text>
      </g>
    </g>
  </g>

  <!-- right: two real modes -->
  <g transform="translate(700 40)">
    <text x="222" y="0" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#5A6A85" letter-spacing="1">ДВА СПОСОБА РАБОТАТЬ</text>

    <!-- Panel A: ribbon / manual -->
    <g transform="translate(0 16)">
      <rect x="0" y="0" width="444" height="140" rx="16" fill="url(#panel-amber)" stroke="#3A3320"/>
      <text x="20" y="28" font-family="ui-monospace,monospace" font-size="16" fill="#F5A623">РУКАМИ · ЛЕНТА REVIT</text>

      <!-- ribbon strip -->
      <rect x="20" y="44" width="404" height="30" rx="6" fill="#0E1930" stroke="#28395C"/>
      <rect x="24" y="48" width="52" height="22" rx="5" fill="#F5A623"/>
      <text x="50" y="63" text-anchor="middle" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#0B1220">ERP</text>
      <text x="90" y="63" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" fill="#9AA7BC">Схемы · Щиты · Нагрузки · Освещение · Листы</text>

      <!-- tool icon row -->
      <g transform="translate(20 94)" fill="none" stroke="#C4CEDD" stroke-width="1.5">
        <rect x="0" y="0" width="26" height="26" rx="5"/>
        <path d="M13 6 L13 12 M8 12 L18 12 M13 12 L13 20" stroke="#F5A623"/>
        <circle cx="46" cy="13" r="13" stroke="#C4CEDD"/>
        <path d="M40 13 h12 M46 7 v12" stroke="#F5A623"/>
        <rect x="72" y="0" width="26" height="26" rx="5"/>
        <path d="M78 8 h14 M78 13 h14 M78 18 h9" stroke="#F5A623"/>
        <rect x="112" y="4" width="18" height="18" rx="9" stroke="#F5A623"/>
        <path d="M121 4 v-6 M117 -2 h8" stroke="#F5A623"/>
      </g>
      <text x="424" y="120" text-anchor="end" font-family="ui-monospace,monospace" font-size="14" fill="#7C8AA0">40+ команд</text>
    </g>

    <!-- connector -->
    <g transform="translate(222 164)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#3A4A66" stroke-width="1.5"/>
      <circle cx="0" cy="15" r="15" fill="#0B1220" stroke="#3A4A66"/>
      <text x="0" y="20" text-anchor="middle" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" fill="#7C8AA0">или</text>
    </g>

    <!-- Panel B: AI dialogue -->
    <g transform="translate(0 200)">
      <rect x="0" y="0" width="444" height="144" rx="16" fill="url(#panel-cyan)" stroke="#1F4048"/>
      <text x="20" y="28" font-family="ui-monospace,monospace" font-size="16" fill="#5AC8E0">СЛОВАМИ · ДИАЛОГ С CLAUDE</text>

      <!-- user bubble -->
      <rect x="20" y="42" width="230" height="30" rx="14" fill="#16232E" stroke="#2A3B47"/>
      <text x="36" y="62" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#C4CEDD">Расставь светильники в 305</text>

      <!-- assistant bubble with confirm gate -->
      <rect x="60" y="80" width="364" height="46" rx="14" fill="#0E2830" stroke="#245257"/>
      <text x="76" y="100" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#B9E7EF">Предлагаю 4 светильника по сетке.</text>
      <text x="76" y="118" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#B9E7EF">Подтверждаете?</text>

      <!-- confirm-gate glyph -->
      <g transform="translate(400 92)">
        <rect x="-16" y="-16" width="32" height="32" rx="9" fill="#5AC8E0"/>
        <path d="M-8 0 L-2 7 L9 -8" fill="none" stroke="#0B1220" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
